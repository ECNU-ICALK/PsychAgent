hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false
  filter_groups:
    enable: True
    max_num_gen_batches: 10

data:
  # train_files: /mnt/workspace2/yyt/verl-agent-master/data/verl-agent/text/train.parquet
  # val_files: /mnt/workspace2/yyt/verl-agent-master/data/verl-agent/text/train.parquet
  train_batch_size: 4
  val_batch_size: 1
  max_prompt_length: 2048
  max_response_length: 512
  filter_overlong_prompts: true
  truncation: error
  return_raw_chat: true

actor_rollout_ref:
  model:
    path: /fs-computility/CL4Mind/shared/models/models/Qwen2.5-7B-Instruct
    use_remove_padding: true
    enable_gradient_checkpointing: true
  actor:
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 256
    ppo_micro_batch_size_per_gpu: 32
    use_kl_loss: true
    kl_loss_coef: 0.01
    kl_loss_type: low_var_kl
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    fsdp_config:
      param_offload: false
      optimizer_offload: false
    use_invalid_action_penalty: true
    invalid_action_penalty_coef: 0.1
  rollout:
    log_prob_micro_batch_size_per_gpu: 32
    tensor_model_parallel_size: 2
    name: vllm
    gpu_memory_utilization: 0.6
    enable_chunked_prefill: false
    enforce_eager: false
    free_cache_engine: false
    val_kwargs:
      temperature: 0.4
      do_sample: true
  ref:
    log_prob_micro_batch_size_per_gpu: 32
    fsdp_config:
      param_offload: true

env:
  env_name: therapy
  seed: 0
  max_steps: 50
  rollout:
    n: 8

trainer:
  critic_warmup: 0
  logger: ["console"]
  project_name: verl_agent_therapy
  experiment_name: dapo_qwen2.5_1.5b
  n_gpus_per_node: 2
  nnodes: 1
  save_freq: -1
  test_freq: 5
  total_epochs: 10
  val_before_train: false

reward_model:
  reward_manager: episode
